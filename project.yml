name: SwanKit
options:
  bundleIdPrefix: com.anobisoft
  deploymentTarget:
    iOS: "16.0"
    tvOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "26.6"
  generateEmptyDirectories: true
  
fileGroups:
  - project.yml
  - Package.swift
  - SwanKit.xctestplan
  - README.md
  - LICENSE
  - .gitignore
  - utilities

# Подключаем наш пакет локально
packages:
  SwanKit:
    path: .
  
targets:
  # =========================================================================
  # 1. Demo Application — iOS
  # =========================================================================
  SwanKitDemo_iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Demo/SwanKitDemo_iOS
    dependencies:
      - package: SwanKit
        product: SwanKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anobisoft.swankit.demo.ios
      PRODUCT_NAME: SwanKitDemo
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      TARGETED_DEVICE_FAMILY: "1,2"

  # =========================================================================
  # 2. Demo Application — tvOS
  # =========================================================================
  SwanKitDemo_tvOS:
    type: application
    platform: tvOS
    deploymentTarget: "16.0"
    sources: 
      - path: Demo/SwanKitDemo_tvOS
    dependencies:
      - package: SwanKit
        product: SwanKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anobisoft.swankit.demo.tvos
      PRODUCT_NAME: SwanKitDemo
      ASSETCATALOG_COMPILER_APPICON_NAME: App Icon
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""

  # =========================================================================
  # 3. Demo Application — macOS
  # =========================================================================
  SwanKitDemo_macOS:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources: 
      - path: Demo/SwanKitDemo_macOS
    dependencies:
      - package: SwanKit
        product: SwanKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anobisoft.swankit.demo.macos
      PRODUCT_NAME: SwanKitDemo
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""

schemes:
  SwanKitDemo_iOS:
    build:
      targets:
        SwanKitDemo_iOS: [run]
    run:
      executable: SwanKitDemo_iOS

  SwanKitDemo_tvOS:
    build:
      targets:
        SwanKitDemo_tvOS: [run]
    run:
      executable: SwanKitDemo_tvOS

  SwanKitDemo_macOS:
    build:
      targets:
        SwanKitDemo_macOS: [run]
    run:
      executable: SwanKitDemo_macOS

settings:
  base:
    SWIFT_VERSION: 6.2
    CODE_SIGN_STYLE: Manual
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE
